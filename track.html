<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Track Device</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>📡 Tracking Aktif...</h2>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

// ambil nama device (sekali aja)
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = prompt("Nama HP kamu (contoh: HP Rumah):");
  localStorage.setItem("deviceId", deviceId);
}

// kirim lokasi terus
navigator.geolocation.watchPosition(function(pos){
  firebase.database().ref("devices/" + deviceId).set({
    lat: pos.coords.latitude,
    lon: pos.coords.longitude,
    time: Date.now()
  });
});
</script>

</body>
  </html>
