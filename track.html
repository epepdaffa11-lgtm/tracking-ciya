<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tracking Device</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:sans-serif;
text-align:center;
background:#0f172a;
color:white;
}
</style>
</head>

<body>

<h2>📡 Tracking Aktif</h2>
<p id="status">Menunggu lokasi...</p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

// 📱 DEVICE ID
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = prompt("Nama HP kamu (contoh: HP Rumah):");
  localStorage.setItem("deviceId", deviceId);
}

// 🖥️ STATUS
function updateStatus(text){
  document.getElementById("status").innerHTML = text;
}

// 📍 KIRIM LOKASI
function kirimLokasi(pos){
  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;
  let acc = pos.coords.accuracy;

  console.log("📍 lokasi:", lat, lon);

  firebase.database().ref("devices/" + deviceId).set({
    lat: lat,
    lon: lon,
    acc: acc,
    time: Date.now()
  });

  updateStatus(`
  📍 ${lat}, ${lon} <br>
  🎯 Akurasi: ${acc}m <br>
  ⏱️ ${new Date().toLocaleTimeString()}
  `);
}

// ❌ ERROR
function error(err){
  console.log("❌ error:", err.message);
  updateStatus("❌ Error: " + err.message);
}

// 🚀 TRACK UTAMA
navigator.geolocation.watchPosition(kirimLokasi, error, {
  enableHighAccuracy: true,
  maximumAge: 0,
  timeout: 10000
});

// 🔁 PAKSA UPDATE (ANTI STUCK)
setInterval(()=>{
  navigator.geolocation.getCurrentPosition(kirimLokasi, error, {
    enableHighAccuracy: true
  });
}, 3000);

// 💤 ANTI SLEEP LOG
setInterval(()=>{
  console.log("tracking aktif...");
}, 2000);

// 🔆 WAKE LOCK
let wakeLock = null;

async function keepAwake(){
  try{
    wakeLock = await navigator.wakeLock.request('screen');
    console.log("🔆 layar dijaga tetap hidup");
  }catch(e){
    console.log("WakeLock gagal");
  }
}

keepAwake();

document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible"){
    keepAwake();
  }
});

// 🔊 TERIMA PERINTAH BUNYI
firebase.database().ref("command").on("value", snap=>{
  let cmd = snap.val();

  if(cmd && cmd.playSound){
    console.log("🔊 bunyi dari view!");

    let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");
    audio.play();

    firebase.database().ref("command").set({playSound:false});
  }
});
</script>

</body>
</html>
