<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Track Device</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>📡 Tracking Aktif...</h2>
<p id="status">Menunggu lokasi...</p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

// ambil nama device
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = prompt("Nama HP kamu (contoh: HP Rumah):");
  localStorage.setItem("deviceId", deviceId);
}

// fungsi kirim lokasi
function kirimLokasi(pos){
  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;

  firebase.database().ref("devices/" + deviceId).set({
    lat: lat,
    lon: lon,
    time: Date.now()
  });

  document.getElementById("status").innerHTML =
    "📍 Lokasi terkirim:<br>" + lat + ", " + lon;
}

// error
function error(err){
  document.getElementById("status").innerHTML =
    "❌ Error: " + err.message;
}

// 🔥 TRACK UTAMA (AKURAT)
navigator.geolocation.watchPosition(kirimLokasi, error, {
  enableHighAccuracy: true,
  maximumAge: 0,
  timeout: 5000
});

// 🔥 PAKSA UPDATE TIAP 5 DETIK
setInterval(()=>{
  navigator.geolocation.getCurrentPosition(kirimLokasi, error);
}, 5000);

</script>

</body>
</html>
