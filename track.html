<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Track Device</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>📡 Tracking Aktif...</h2>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

// ambil nama device (auto simpan)
let deviceId = localStorage.getItem("deviceId");

if(!deviceId){
  deviceId = prompt("Nama HP kamu (contoh: HP Rumah):");
  localStorage.setItem("deviceId", deviceId);
}

// fungsi kirim lokasi
function kirimLokasi(pos){
  firebase.database().ref("devices/" + deviceId).set({
    lat: pos.coords.latitude,
    lon: pos.coords.longitude,
    acc: pos.coords.accuracy,
    time: Date.now()
  });
}

// error handler
function error(err){
  document.body.innerHTML = "❌ Lokasi gagal: " + err.message;
}

// TRACK LEBIH AKURAT & CEPAT
navigator.geolocation.watchPosition(kirimLokasi, error, {
  enableHighAccuracy: true,
  maximumAge: 0,
  timeout: 5000
});
</script>

</body>
</html>
