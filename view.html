<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tracking Pro Max</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1220;
color:white;
display:flex;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
width:280px;
background:#111827;
height:100vh;
overflow:auto;
padding:10px;
transition:0.3s;
position:relative;
}

#sidebar.closed{
width:0;
padding:0;
overflow:hidden;
}

/* TOGGLE BUTTON */
#toggleBtn{
position:absolute;
top:10px;
right:-15px;
background:#38bdf8;
border:none;
color:black;
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
font-weight:bold;
}

/* DEVICE BOX */
.device{
background:#1f2937;
padding:10px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.device:hover{
background:#374151;
}

/* MAP */
#map{
flex:1;
height:100vh;
}

/* TOP HUD */
#hud{
position:absolute;
top:10px;
left:10px;
z-index:999;
background:rgba(0,0,0,0.6);
padding:10px 14px;
border-radius:12px;
backdrop-filter: blur(6px);
font-size:13px;
}

/* BOTTOM INFO */
#info{
position:absolute;
bottom:10px;
left:10px;
z-index:999;
background:rgba(0,0,0,0.6);
padding:10px 14px;
border-radius:12px;
backdrop-filter: blur(6px);
font-size:13px;
}

.coord{
color:#38bdf8;
font-weight:bold;
}
</style>
</head>

<body>

<div id="sidebar">
<button id="toggleBtn">⟨</button>

<h3>📱 Devices</h3>
<div id="deviceList">Loading...</div>
</div>

<div id="map"></div>

<!-- HUD -->
<div id="hud">
📡 Status: <span id="status">Loading...</span>
</div>

<!-- INFO -->
<div id="info">
📍 Koordinat: <span class="coord" id="coords">-</span>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

// MAP
let map = L.map('map').setView([-2.5, 118], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let markers = {};

// TOGGLE SIDEBAR
let sidebar = document.getElementById("sidebar");
let toggleBtn = document.getElementById("toggleBtn");

toggleBtn.onclick = () => {
  sidebar.classList.toggle("closed");
  toggleBtn.innerText = sidebar.classList.contains("closed") ? "⟩" : "⟨";
};

// FOCUS MAP
function focusDevice(lat, lon){
  map.setView([lat, lon], 17);
}

// SIDEBAR RENDER
function renderSidebar(devices){
  let list = document.getElementById("deviceList");
  list.innerHTML = "";

  Object.keys(devices).forEach(id=>{
    let d = devices[id];
    if(!d.lat || !d.lon) return;

    let div = document.createElement("div");
    div.className = "device";
    div.innerHTML = `
      📱 <b>${id}</b><br>
      📍 ${d.lat.toFixed(4)}, ${d.lon.toFixed(4)}
    `;

    div.onclick = () => {
      focusDevice(d.lat, d.lon);
      if(markers[id]) markers[id].openPopup();
    };

    list.appendChild(div);
  });
}

// FIREBASE
firebase.database().ref("devices").on("value", function(snapshot){
  let devices = snapshot.val();

  document.getElementById("status").innerText = "LIVE 🔴";

  if(!devices){
    document.getElementById("deviceList").innerHTML = "No devices";
    return;
  }

  renderSidebar(devices);

  Object.keys(devices).forEach(id=>{
    let d = devices[id];

    if(!d.lat || !d.lon) return;

    document.getElementById("coords").innerText =
      d.lat.toFixed(5) + ", " + d.lon.toFixed(5);

    let popup = `
      📱 <b>${id}</b><br>
      📍 ${d.lat}<br>
      📍 ${d.lon}<br>
      🕒 ${new Date(d.time || Date.now()).toLocaleTimeString()}
    `;

    if(markers[id]){
      markers[id].setLatLng([d.lat, d.lon]);
      markers[id].setPopupContent(popup);
    } else {
      markers[id] = L.marker([d.lat, d.lon]).addTo(map)
      .bindPopup(popup);
    }
  });
});
</script>

</body>
</html>
