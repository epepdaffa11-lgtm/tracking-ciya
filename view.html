<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tracking Pro Max</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1220;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
position:fixed;
left:0;
top:0;
width:300px;
height:100vh;
background:#111827;
color:white;
padding:10px;
transition:0.3s;
z-index:1000;
overflow:auto;
}

#sidebar.closed{
transform:translateX(-100%);
}

/* TOGGLE */
#toggleBtn{
position:fixed;
top:15px;
left:310px;
z-index:1101;
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#38bdf8;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

#toggleBtn.closed{
left:10px;
}

/* SEARCH */
#search{
width:100%;
padding:8px;
border-radius:8px;
border:none;
outline:none;
margin-bottom:10px;
}

/* DEVICE ITEM */
.device{
background:#1f2937;
padding:10px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.device:hover{
background:#374151;
transform:scale(1.02);
}

.device.active{
background:#2563eb;
}

/* MAP */
#map{
margin-left:300px;
height:100vh;
transition:0.3s;
}

#sidebar.closed ~ #map{
margin-left:0;
}
</style>
</head>

<body>

<div id="sidebar">
<h3>📱 Devices</h3>
<input id="search" placeholder="Cari device..." />
<div id="deviceList"></div>
</div>

<button id="toggleBtn">⟨</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

// MAP
let map = L.map('map').setView([-2.5, 118], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let markers = {};
let lastActive = null;

/* TOGGLE SIDEBAR */
let sidebar = document.getElementById("sidebar");
let toggleBtn = document.getElementById("toggleBtn");

toggleBtn.onclick = () => {
  sidebar.classList.toggle("closed");
  toggleBtn.classList.toggle("closed");

  toggleBtn.innerText = sidebar.classList.contains("closed") ? "⟩" : "⟨";
};

/* SEARCH */
document.getElementById("search").addEventListener("input", function(e){
  let val = e.target.value.toLowerCase();
  document.querySelectorAll(".device").forEach(el=>{
    el.style.display = el.innerText.toLowerCase().includes(val) ? "block" : "none";
  });
});

/* FOCUS DEVICE (FIXED) */
function focusDevice(lat, lon, id){
  if(!lat || !lon) return;

  // smooth zoom
  map.flyTo([lat, lon], 18, {
    duration: 0.8
  });

  // highlight sidebar
  if(lastActive){
    lastActive.classList.remove("active");
  }

  let el = document.getElementById("dev-"+id);
  if(el){
    el.classList.add("active");
    lastActive = el;
  }

  // open popup
  if(markers[id]){
    markers[id].openPopup();
  }
}

/* RENDER SIDEBAR */
function renderSidebar(devices){
  let list = document.getElementById("deviceList");
  list.innerHTML = "";

  Object.keys(devices).forEach(id=>{
    let d = devices[id];
    if(!d.lat || !d.lon) return;

    let div = document.createElement("div");
    div.className = "device";
    div.id = "dev-"+id;

    div.innerHTML = `
      📱 <b>${id}</b><br>
      📍 ${d.lat.toFixed(4)}, ${d.lon.toFixed(4)}
    `;

    div.onclick = () => {
      focusDevice(d.lat, d.lon, id);
    };

    list.appendChild(div);
  });
}

/* FIREBASE */
firebase.database().ref("devices").on("value", function(snapshot){
  let devices = snapshot.val();
  if(!devices) return;

  renderSidebar(devices);

  Object.keys(devices).forEach(id=>{
    let d = devices[id];
    if(!d.lat || !d.lon) return;

    let popup = `
      📱 <b>${id}</b><br>
      📍 Lat: ${d.lat}<br>
      📍 Lon: ${d.lon}<br>
      🕒 ${new Date(d.time || Date.now()).toLocaleTimeString()}
    `;

    if(markers[id]){
      markers[id].setLatLng([d.lat, d.lon]);
      markers[id].setPopupContent(popup);
    } else {
      markers[id] = L.marker([d.lat, d.lon]).addTo(map)
      .bindPopup(popup);
    }
  });
});
</script>

</body>
</html>
