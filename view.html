<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Tracking Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:sans-serif;
background:#020617;
color:white;
}

h2{
text-align:center;
padding:10px;
}

#map{
height:70vh;
}

.info{
padding:10px;
background:#0f172a;
}

a{
color:#22c55e;
}
</style>
</head>

<body>

<h2>📍 Live Tracking Pro</h2>
<div id="map"></div>

<div class="info" id="info">
Menunggu lokasi...
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

let map = L.map('map').setView([0,0], 2);

// DARK MODE MAP
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let marker;

firebase.database().ref("lokasi").on("value", function(snapshot){
  let data = snapshot.val();

  if(data){
    let lat = data.lat;
    let lon = data.lon;

    map.setView([lat, lon], 17);

    if(marker){
      marker.setLatLng([lat, lon]);
    } else {
      marker = L.marker([lat, lon]).addTo(map);
    }

    document.getElementById("info").innerHTML = `
📍 Latitude: ${lat} <br>
📍 Longitude: ${lon} <br><br>

<a href="https://maps.google.com/?q=${lat},${lon}" target="_blank">
👉 Buka di Google Maps
</a>
    `;
  }
});
</script>

</body>
</html>
