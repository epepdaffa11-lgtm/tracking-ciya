<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multi Tracking</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:sans-serif;
background:#f1f5f9;
}

h2{
text-align:center;
padding:12px;
background:white;
margin:0;
}

#map{
height:90vh;
}
</style>
</head>

<body>

<h2>📍 Multi Device Tracking</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

let map = L.map('map').setView([0,0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let markers = {};

firebase.database().ref("devices").on("value", function(snapshot){
  let devices = snapshot.val();

  if(devices){
    Object.keys(devices).forEach(id=>{
      let d = devices[id];

      let lat = d.lat;
      let lon = d.lon;

      if(markers[id]){
        markers[id].setLatLng([lat, lon]);
      } else {
        markers[id] = L.marker([lat, lon]).addTo(map)
        .bindPopup("📱 " + id);
      }
    });
  }
});
</script>

</body>
</html>
