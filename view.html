<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tracking Pro Max Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b1220;
overflow:hidden;
}

/* SIDEBAR */
#sidebar{
position:fixed;
left:0;
top:0;
width:300px;
height:100vh;
background:#111827;
color:white;
padding:10px;
overflow:auto;
transition:0.3s;
z-index:1000;
}

#sidebar.closed{
transform:translateX(-100%);
}

/* TOGGLE */
#toggleBtn{
position:fixed;
top:15px;
left:310px;
z-index:1101;
width:40px;
height:40px;
border-radius:50%;
border:none;
background:#38bdf8;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

#toggleBtn.closed{
left:10px;
}

/* DEVICE */
.device{
background:#1f2937;
padding:10px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.device:hover{
background:#374151;
}

.device.active{
background:#2563eb;
}

.status{
font-size:12px;
margin-top:4px;
}

.online{color:#22c55e;}
.offline{color:#ef4444;}

/* BUTTON */
button{
margin-top:5px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#38bdf8;
font-weight:bold;
font-size:12px;
}

/* MAP */
#map{
margin-left:300px;
height:100vh;
transition:0.3s;
}

#sidebar.closed ~ #map{
margin-left:0;
}
</style>
</head>

<body>

<div id="sidebar">
<h3>📱 Devices</h3>
<div id="deviceList"></div>
</div>

<button id="toggleBtn">⟨</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDRAKVsQDg-7sQpUloHi_mrLfbus2jKxQs",
  databaseURL: "https://tracking-7945d-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

let map = L.map('map').setView([-2.5, 118], 5);

L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19 }
).addTo(map);

let markers = {};
let currentDevices = {};
let lastActive = null;
let lastPos = {};

/* TOGGLE */
let sidebar = document.getElementById("sidebar");
let toggleBtn = document.getElementById("toggleBtn");

toggleBtn.onclick = () => {
  sidebar.classList.toggle("closed");
  toggleBtn.classList.toggle("closed");
  toggleBtn.innerText = sidebar.classList.contains("closed") ? "⟩" : "⟨";
};

/* STATUS FUNCTION */
function getStatus(time){
  let diff = Date.now() - time;

  if(diff < 5000){
    return `<span class="online">🟢 Online</span>`;
  } else {
    return `<span class="offline">🔴 Offline</span>`;
  }
}

function getLastSeen(time){
  let sec = Math.floor((Date.now() - time)/1000);

  if(sec < 60) return sec + " detik lalu";
  if(sec < 3600) return Math.floor(sec/60) + " menit lalu";

  return Math.floor(sec/3600) + " jam lalu";
}

/* FOCUS */
function focusDevice(lat, lon, id){
  map.flyTo([lat, lon], 17, { duration: 0.8 });

  if(lastActive) lastActive.classList.remove("active");

  let el = document.getElementById("dev-"+id);
  if(el){
    el.classList.add("active");
    lastActive = el;
  }

  if(markers[id]) markers[id].openPopup();
}

/* SIDEBAR */
function renderSidebar(devices){
  let list = document.getElementById("deviceList");
  list.innerHTML = "";

  Object.keys(devices).forEach(id=>{
    let d = devices[id];
    if(!d.lat || !d.lon) return;

    let div = document.createElement("div");
    div.className = "device";
    div.id = "dev-"+id;

    div.innerHTML = `
      📱 <b>${id}</b><br>
      📍 ${d.lat.toFixed(4)}, ${d.lon.toFixed(4)}<br>
      <div class="status">${getStatus(d.time)}</div>
      ⏱️ ${getLastSeen(d.time)}
    `;

    div.onclick = () => {
      focusDevice(d.lat, d.lon, id);
    };

    list.appendChild(div);
  });
}

/* FIREBASE */
firebase.database().ref("devices").on("value", function(snapshot){
  let devices = snapshot.val();
  if(!devices) return;

  currentDevices = devices;

  renderSidebar(devices);

  Object.keys(devices).forEach(id=>{
    let d = devices[id];
    if(!d.lat || !d.lon) return;

    if(lastPos[id]){
      let diff = Math.abs(lastPos[id].lat - d.lat) + Math.abs(lastPos[id].lon - d.lon);
      if(diff < 0.00005) return;
    }

    lastPos[id] = {lat: d.lat, lon: d.lon};

    let popup = `
      📱 <b>${id}</b><br>
      📍 ${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}<br>
      ${getStatus(d.time)}<br>
      ⏱️ ${getLastSeen(d.time)}
    `;

    if(markers[id]){
      markers[id].setLatLng([d.lat, d.lon]);
      markers[id].setPopupContent(popup);
    } else {
      markers[id] = L.marker([d.lat, d.lon]).addTo(map)
      .bindPopup(popup);
    }
  });
});

/* AUTO UPDATE STATUS */
setInterval(()=>{
  renderSidebar(currentDevices);
}, 3000);
</script>

</body>
</html>
